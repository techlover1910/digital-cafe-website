services:
  - type: web
    name: digital-cafe-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn backend.app:app --bind 0.0.0.0:$PORT --workers 4 --timeout 120
    envVars:
      - key: FLASK_DEBUG
        value: "0"
      - key: MAX_CONTENT_LENGTH
        value: "10485760"
